name: wheels

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: wheels-${{ github.event_name == 'push' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-latest
          - os: macos-15-intel
          - os: windows-latest
            msystem: UCRT64
            msys_prefix: /ucrt64
            mingw_prefix: mingw-w64-ucrt-x86_64
          - os: windows-11-arm
            msystem: CLANGARM64
            msys_prefix: /clangarm64
            mingw_prefix: mingw-w64-clang-aarch64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: install ffmpeg deps
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          path-type: strict
          install: >-
            base-devel
            ${{ matrix.mingw_prefix }}-binutils
            ${{ matrix.mingw_prefix }}-gcc
            ${{ matrix.mingw_prefix }}-pkgconf
            ${{ matrix.mingw_prefix }}-python

      - name: build ffmpeg
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"
        run: python3 scripts/build_ffmpeg.py

      - name: build ffmpeg
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ${{ matrix.msys_prefix }}/bin/python scripts/build_ffmpeg.py

      - name: build wheels
        uses: pypa/cibuildwheel@f03ac7617d6cff873ccf24cc0d567ef5ba5a9e6d # v4.0.0
        with:
          extras: uv

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl
          if-no-files-found: error
